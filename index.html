<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven 3D - Fast Load</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        #gui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        .panel { position: absolute; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        .side-right { right: 20px; top: 50%; transform: translateY(-50%); }
        .bottom { bottom: 20px; left: 50%; transform: translateX(-50%); flex-direction: row; }
        .btn { width: 55px; height: 55px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: 3px solid #ddd; box-shadow: 0 4px #bbb; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #bbb; }
        #job { position: absolute; top: 20px; right: 20px; background: #00A2FF; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="gui">
        <div id="job" onclick="this.innerText='👔 Job: Police'">👔 Job: Citizen</div>
        <div class="panel side-right">
            <div class="btn" onclick="spawnCar()">🚗</div>
            <div class="btn" onclick="spawnHouse()">🏠</div>
            <div class="btn" onclick="location.reload()">🔄</div>
        </div>
        <div class="panel bottom">
            <div class="btn">🍕</div>
            <div class="btn">📱</div>
            <div class="btn">🛠️</div>
        </div>
    </div>

    <script>
        // 1. Scene Setup (Optimized for Speed)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));

        // 2. Map (Road & Grass)
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x567d46}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshStandardMaterial({color: 0x333333}));
        road.rotation.x = -Math.PI/2;
        road.position.y = 0.05;
        scene.add(road);

        // 3. Player & Logic
        const player = new THREE.Mesh(new THREE.BoxGeometry(1.5, 3, 1.5), new THREE.MeshStandardMaterial({color: 0x222222}));
        player.position.y = 1.5;
        scene.add(player);

        let car = null;
        window.spawnCar = () => {
            if(car) scene.remove(car);
            car = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 8), new THREE.MeshStandardMaterial({color: 0x001144}));
            scene.add(car);
        };

        window.spawnHouse = () => {
            const h = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 15), new THREE.MeshStandardMaterial({color: 0xffffff}));
            h.position.set(25, 5, player.position.z);
            scene.add(h);
        };

        // 4. Controls
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);
            const s = keys['ShiftLeft'] ? 0.8 : 0.3;
            if(keys['KeyW']) player.position.z -= s;
            if(keys['KeyS']) player.position.z += s;
            if(keys['KeyA']) player.position.x -= s;
            if(keys['KeyD']) player.position.x += s;

            if(car) car.position.copy(player.position);
            
            camera.position.set(player.position.x, player.position.y + 12, player.position.z + 18);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
