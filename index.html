<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven 3D - Fixed World</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        #gui { position: fixed; inset: 0; pointer-events: none; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; pointer-events: auto; border: 2px solid rgba(255,255,255,0.1); }
        .slot { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.2s; }
        .slot.active { background: #00A2FF; border-color: white; box-shadow: 0 0 15px #00A2FF; }
    </style>
</head>
<body>
    <div id="gui">
        <div id="inventory">
            <div class="slot">🍕</div>
            <div class="slot">📱</div>
            <div class="slot active">🛠️</div>
            <div class="slot">🚗</div>
            <div class="slot">🏠</div>
        </div>
    </div>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 100, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // THE MAP
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({color: 0x567d46}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 2000), new THREE.MeshStandardMaterial({color: 0x333333}));
        road.rotation.x = -Math.PI/2;
        road.position.y = 0.1;
        scene.add(road);

        // PLAYER (Glowing Blue Cube)
        const player = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 2), new THREE.MeshStandardMaterial({color: 0x00A2FF, emissive: 0x00A2FF}));
        player.position.set(0, 2.1, 0);
        scene.add(player);

        // CAMERA SETUP (Looking down from behind)
        camera.position.set(0, 30, 40);
        camera.lookAt(0, 0, 0);

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);
            if(keys['KeyW']) player.position.z -= 0.5;
            if(keys['KeyS']) player.position.z += 0.5;
            if(keys['KeyA']) player.position.x -= 0.5;
            if(keys['KeyD']) player.position.x += 0.5;

            // Camera stays locked to player
            camera.position.set(player.position.x, player.position.y + 25, player.position.z + 40);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
