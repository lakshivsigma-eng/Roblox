<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven 3D - RP World</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        
        /* THE ROBLOX HUD */
        #gui { position: fixed; inset: 0; pointer-events: none; }
        
        #top-bar { position: absolute; top: 10px; left: 10px; display: flex; gap: 10px; pointer-events: auto; }
        .icon-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 12px; pointer-events: auto; }
        .slot { width: 55px; height: 55px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; cursor: pointer; transition: 0.2s; }
        .slot:hover { background: rgba(255,255,255,0.3); border-color: #00A2FF; }
        .slot.active { background: #00A2FF; border-color: white; }

        #status-msg { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: white; font-weight: bold; font-size: 24px; text-shadow: 2px 2px 5px black; opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="gui">
        <div id="top-bar">
            <div class="icon-btn">🏠</div>
            <div class="icon-btn">🚗</div>
            <div class="icon-btn">👤</div>
        </div>

        <div id="status-msg">HOUSE UNLOCKED</div>

        <div id="inventory">
            <div class="slot" onclick="select(this, '🍕')">🍕</div>
            <div class="slot" onclick="select(this, '📱')">📱</div>
            <div class="slot active" onclick="select(this, '🛠️')">🛠️</div>
            <div class="slot" onclick="select(this, '🚗')">🚗</div>
            <div class="slot" onclick="select(this, '🏠')">🏠</div>
        </div>
    </div>

    <script>
        // --- 1. 3D WORLD SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky Blue
        scene.fog = new THREE.Fog(0x87CEEB, 20, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(20, 40, 20);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- 2. THE MAP (Brookhaven Street) ---
        // Grass
        const grass = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x567d46}));
        grass.rotation.x = -Math.PI/2;
        grass.receiveShadow = true;
        scene.add(grass);

        // Road
        const road = new THREE.Mesh(new THREE.PlaneGeometry(15, 200), new THREE.MeshStandardMaterial({color: 0x333333}));
        road.rotation.x = -Math.PI/2;
        road.position.y = 0.01;
        scene.add(road);

        // House
        function createHouse(x, z) {
            const house = new THREE.Group();
            // Walls
            const walls = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 8), new THREE.MeshStandardMaterial({color: 0xffffff}));
            walls.position.y = 3;
            house.add(walls);
            // Roof
            const roof = new THREE.Mesh(new THREE.ConeGeometry(7, 4, 4), new THREE.MeshStandardMaterial({color: 0x333333}));
            roof.position.y = 7.5;
            roof.rotation.y = Math.PI/4;
            house.add(roof);
            // Door
            const door = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 3), new THREE.MeshStandardMaterial({color: 0x4a2c1d}));
            door.position.set(0, 1.5, 4.01);
            house.add(door);
            
            house.position.set(x, 0, z);
            scene.add(house);
        }
        createHouse(-15, -10); // Neighbor's house
        createHouse(15, -30);  // Your house

        // Street Lights
        function createLight(z) {
            const pole = new THREE.Mesh(new THREE.BoxGeometry(0.3, 10, 0.3), new THREE.MeshStandardMaterial({color: 0x444444}));
            pole.position.set(8, 5, z);
            scene.add(pole);
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({emissive: 0xffff00}));
            lamp.position.set(8, 10, z);
            scene.add(lamp);
        }
        createLight(-20);
        createLight(20);

        // --- 3. THE PLAYER ---
        const player = new THREE.Group();
        const avatar = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 1.2), new THREE.MeshStandardMaterial({color: 0x222222}));
        avatar.position.y = 1.25;
        player.add(avatar);
        scene.add(player);

        // --- 4. INTERACTION & CONTROLS ---
        function select(el, item) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            const msg = document.getElementById('status-msg');
            msg.innerText = "EQUIPPED: " + item;
            msg.style.opacity = '1';
            setTimeout(() => msg.style.opacity = '0', 1500);
        }

        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            requestAnimationFrame(update);
            const moveSpeed = 0.2;
            if (keys['KeyW']) player.position.z -= moveSpeed;
            if (keys['KeyS']) player.position.z += moveSpeed;
            if (keys['KeyA']) player.position.x -= moveSpeed;
            if (keys['KeyD']) player.position.x += moveSpeed;

            // Camera follow
            camera.position.set(player.position.x, player.position.y + 12, player.position.z + 18);
            camera.lookAt(player.position);

            renderer.render(scene, camera);
        }
        update();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
