<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven Supreme RP</title>
    <style>
        :root { --r-blue: #00A2FF; }
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: 'Segoe UI', sans-serif; perspective: 1000px; }
        
        /* 3D WORLD */
        #world { position: absolute; width: 100vw; height: 100vh; transform-style: preserve-3d; transition: transform 0.05s linear; }
        .grass { position: absolute; width: 10000px; height: 10000px; background: #567d46; top: -5000px; left: -5000px; transform: rotateX(90deg); }
        .road { position: absolute; width: 150px; height: 10000px; background: #333; left: 50%; top: -5000px; transform: translateX(-50%) rotateX(90deg) translateZ(1px); border-left: 10px solid #fff; border-right: 10px solid #fff; }

        /* BUILDINGS & INTERIORS */
        .house { position: absolute; width: 150px; height: 100px; background: #fff; transform: translate3d(200px, -50px, -300px); border: 4px solid #444; }
        .door { position: absolute; bottom: 0; left: 60px; width: 30px; height: 50px; background: #4a2c1d; transition: 0.5s; cursor: pointer; transform-origin: left; }
        .interior { position: absolute; width: 100%; height: 100%; background: #ddd; transform: translateZ(-10px); }

        /* AVATAR & CAR */
        #player { position: absolute; width: 30px; height: 30px; background: #222; left: 50%; top: 50%; transform: translate(-50%, -50%) translateZ(20px); border-radius: 50%; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #car { display: none; position: absolute; width: 60px; height: 110px; background: #001144; left: 50%; top: 50%; transform: translate(-50%, -50%) translateZ(15px); border-radius: 10px; border: 4px solid #000; }

        /* UI / HUD */
        #gui { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }
        .panel { position: absolute; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .left-ui { top: 20px; left: 20px; }
        .right-ui { top: 50%; right: 20px; transform: translateY(-50%); }
        .bottom-ui { bottom: 20px; left: 50%; transform: translateX(-50%); flex-direction: row; }
        
        .btn { width: 50px; height: 50px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; border: none; box-shadow: 0 4px #bbb; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 #bbb; }
        .btn.active { background: var(--r-blue); color: white; }

        #job-tag { position: absolute; top: 20px; right: 20px; color: white; font-weight: bold; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 20px; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

    <div id="gui">
        <div id="job-tag" onclick="changeJob()">👔 Job: Citizen</div>
        
        <div class="panel left-ui">
            <div class="btn" onclick="toggleHouse()">🏠</div>
            <div class="btn" onclick="robBank()">💰</div>
        </div>

        <div class="panel right-ui">
            <div class="btn" onclick="toggleView()" id="viewBtn">👁️</div>
            <div class="btn" onclick="spawnCar()">🚗</div>
            <div class="btn" onclick="spawnPet()">🐶</div>
            <div class="btn" onclick="location.reload()">🔄</div>
        </div>

        <div class="panel bottom-ui">
            <div class="btn" onclick="equip('🍕')">🍕</div>
            <div class="btn" onclick="equip('📱')">📱</div>
            <div class="btn" onclick="equip('🔫')">🔫</div>
            <div class="btn" onclick="equip('🕯️')">🕯️</div>
        </div>
    </div>

    <div id="world">
        <div class="grass"></div>
        <div class="road"></div>
        
        <!-- THE MAIN HOUSE -->
        <div class="house" id="house1">
            <div class="interior"></div>
            <div class="door" onclick="this.style.transform='rotateY(-90deg)'"></div>
            <div style="position:absolute; top:-40px; width:100%; height:40px; background:#444;"></div>
        </div>

        <div id="car"></div>
        <div id="player"></div>
    </div>

    <script>
        let px = 0, py = 0, pz = 0;
        let isFirstPerson = false;
        let isInCar = false;
        let money = 5000;
        const world = document.getElementById('world');
        const keys = {};

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function toggleView() {
            isFirstPerson = !isFirstPerson;
            document.getElementById('viewBtn').classList.toggle('active');
            document.getElementById('player').style.opacity = isFirstPerson ? "0" : "1";
        }

        function spawnCar() {
            isInCar = true;
            const c = document.getElementById('car');
            c.style.display = 'block';
            document.getElementById('player').style.opacity = "0";
        }

        function changeJob() {
            const jobs = ["Police", "Doctor", "Chef", "Criminal"];
            const newJob = jobs[Math.floor(Math.random()*jobs.length)];
            document.getElementById('job-tag').innerText = "👔 Job: " + newJob;
        }

        function robBank() {
            money += 1000;
            alert("Bank Robbed! +$1000. Total: $" + money);
        }

        function equip(item) {
            alert("Equipped: " + item);
        }

        function loop() {
            let speed = isInCar ? 15 : 6;
            if(keys['KeyW']) py += speed;
            if(keys['KeyS']) py -= speed;
            if(keys['KeyA']) px += speed;
            if(keys['KeyD']) px -= speed;

            // Camera Logic
            if(isFirstPerson) {
                // First Person Camera
                world.style.transform = `rotateX(0deg) translateY(${py}px) translateX(${px}px) translateZ(400px)`;
            } else {
                // Third Person Brookhaven Camera
                world.style.transform = `rotateX(65deg) translateY(${-400 + py}px) translateX(${px}px)`;
            }

            // Sync Car Position
            if(isInCar) {
                const car = document.getElementById('car');
                car.style.left = `calc(50% - ${px}px)`;
                car.style.top = `calc(50% - ${py}px)`;
            }

            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
