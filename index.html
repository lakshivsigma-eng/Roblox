<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox Pro Launcher</title>
    <style>
        body { margin: 0; background: #191B1D; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .navbar { background: #232527; padding: 15px 30px; display: flex; align-items: center; border-bottom: 1px solid #333; }
        .logo { font-weight: 800; font-size: 24px; color: white; text-decoration: none; margin-right: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; padding: 40px; }
        .card { background: #232527; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid #333; }
        .card:hover { transform: scale(1.05); border-color: #00A2FF; box-shadow: 0 10px 30px rgba(0,162,255,0.2); }
        .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .info { padding: 15px; }
        
        /* REAL LAUNCHER OVERLAY */
        #launcher { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .loader-bar { width: 300px; height: 6px; background: #333; border-radius: 3px; margin: 25px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #00A2FF; animation: load 3.5s forwards; }
        @keyframes load { 0% { width: 0%; } 50% { width: 70%; } 100% { width: 100%; } }
        .launch-icon { width: 100px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <!-- This screen pops up when you click a game -->
    <div id="launcher">
        <img src="https://wikimedia.org" class="launch-icon" style="filter: invert(1);">
        <h1 id="launchTitle" style="font-size: 28px;">Starting Roblox...</h1>
        <div class="loader-bar"><div class="progress"></div></div>
        <p id="status" style="color: #00A2FF; font-weight: bold; letter-spacing: 1px;">AUTHENTICATING...</p>
        <p style="color: #888; font-size: 14px;">Please make sure the Roblox App is installed.</p>
    </div>

    <nav class="navbar"><a href="#" class="logo">ROBLOX</a></nav>
    <div class="grid" id="gameGrid"></div>

    <script>
        const games = [
            { t: "Blox Fruits", i: "https://unsplash.com", url: "https://roblox.com" },
            { t: "Brookhaven 🏡RP", i: "https://unsplash.com", url: "https://roblox.com" },
            { t: "Adopt Me!", i: "https://unsplash.com", url: "https://roblox.com" },
            { t: "Pet Simulator 99", i: "https://unsplash.com", url: "https://roblox.com" },
            { t: "Arsenal", i: "https://unsplash.com", url: "https://roblox.com" }
        ];

        const container = document.getElementById('gameGrid');
        games.forEach(g => {
            const div = document.createElement('div');
            div.className = 'card';
            div.onclick = () => {
                const l = document.getElementById('launcher');
                l.style.display = 'flex';
                document.getElementById('launchTitle').innerText = "Joining " + g.t;
                
                // Simulated status updates for realism
                setTimeout(() => document.getElementById('status').innerText = "CONNECTING TO SERVER...", 1000);
                setTimeout(() => document.getElementById('status').innerText = "LOADING ASSETS...", 2000);
                
                setTimeout(() => {
                    window.location.href = g.url; // Opens the REAL Roblox game
                }, 3800);
            };
            div.innerHTML = `<img src="${g.i}" class="thumb"><div class="info"><b>${g.t}</b></div>`;
            container.appendChild(div);
        });
    </script>
</body>
</html>
