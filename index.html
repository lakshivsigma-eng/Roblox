<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox | Home</title>
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hebo:wght@400;500;700&display=swap">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Link to your external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="switchView('home')">ROBLOX</div>
        <div class="nav-links">
            <div class="nav-link" onclick="switchView('home')">Home</div>
            <div class="nav-link" onclick="switchView('discover')">Discover</div>
        </div>
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search Experiences">
        </div>
        <div class="nav-right">
            <div class="nav-icon"><i class="fas fa-coins" style="color: #F5BD02"></i> <span style="font-size:14px; font-weight:700">1,420</span></div>
            <div class="nav-icon"><i class="fas fa-bell"></i></div>
            <div class="nav-icon"><i class="fas fa-cog"></i></div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="content-area">
            <!-- HOME VIEW -->
            <div id="view-home" class="view active">
                <div class="section-header"><h2 class="section-title">Continue Playing</h2></div>
                <div class="scroller" id="continue-list"></div>

                <div style="margin-top: 30px;">
                    <div class="section-header"><h2 class="section-title">Recommended For You</h2></div>
                    <div class="discover-grid" id="home-grid"></div>
                </div>
            </div>

            <!-- DISCOVER VIEW -->
            <div id="view-discover" class="view">
                <div class="section-header"><h2 class="section-title">Discover</h2></div>
                <div class="discover-grid" id="discover-grid"></div>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <h3 style="margin-bottom: 15px; font-size: 16px;">Friends (Online)</h3>
            <div id="friends-list"></div>
        </div>
    </div>

    <div id="toast">🚀 Opening on itch.io...</div>

    <script>
        const gamesData = [
            { title: "Trees Hate You", players: "152K", likes: "96%", img: "https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=400", url: "https://itch.io/search?q=trees+hate+you" },
            { title: "Friday Night Funkin'", players: "1.2M", likes: "98%", img: "https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400", url: "https://ninja-muffin24.itch.io/funkin" },
            { title: "Celeste Classic", players: "45K", likes: "99%", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400", url: "https://maddy-thorson.itch.io/celeste-classic" },
            { title: "Sort the Court!", players: "200K", likes: "94%", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400", url: "https://graebor.itch.io/sort-the-court" },
            { title: "A Short Hike", players: "88K", likes: "97%", img: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=400", url: "https://adamgryu.itch.io/a-short-hike" },
            { title: "Minit", players: "12K", likes: "91%", img: "https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?w=400", url: "https://moshboy.itch.io/minit" },
            { title: "Baba Is You", players: "55K", likes: "96%", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400", url: "https://hempuli.itch.io/baba-is-you" },
            { title: "The Doll Shop", players: "15K", likes: "89%", img: "https://images.unsplash.com/photo-1551103756-c4eb202270ff?w=400", url: "https://atelier-sentô.itch.io/the-doll-shop" }
        ];

        function createCard(game) {
            const div = document.createElement('div');
            div.className = 'game-card';
            div.onclick = () => launch(game);
            div.innerHTML = `
                <div class="thumbnail-container">
                    <img src="${game.img}" class="thumbnail" alt="${game.title}" loading="lazy">
                    <div class="play-overlay">
                        <i class="fas fa-play-circle play-icon"></i>
                        <span class="play-text">PLAY ON ITCH.IO</span>
                    </div>
                </div>
                <div class="card-info">
                    <div class="game-name">${game.title}</div>
                    <div class="game-stats">
                        <span><i class="fas fa-thumbs-up" style="color:#00A2FF"></i> ${game.likes}</span>
                        <span><i class="fas fa-user"></i> ${game.players}</span>
                    </div>
                </div>
            `;
            return div;
        }

        function init() {
            const homeGrid = document.getElementById('home-grid');
            const discGrid = document.getElementById('discover-grid');
            const contList = document.getElementById('continue-list');

            gamesData.slice(0, 4).forEach(g => contList.appendChild(createCard(g)));
            gamesData.slice(4, 8).forEach(g => homeGrid.appendChild(createCard(g)));
            gamesData.forEach(g => discGrid.appendChild(createCard(g)));

            const fl = document.getElementById('friends-list');
            ['Builderman', 'Nightmare', 'Stickmaster', 'Robloxian'].forEach(name => {
                fl.innerHTML += `<div class="friend-row">
                    <div class="avatar"><i class="fas fa-user"></i><div class="status-dot"></div></div>
                    <div><div style="font-size:14px; font-weight:600">${name}</div><div style="font-size:11px; color:#B8B8B8">Online</div></div>
                </div>`;
            });
        }

        function launch(game) {
            const toast = document.getElementById('toast');
            toast.innerText = `🚀 Opening ${game.title} on itch.io...`;
            toast.style.display = 'block';
            window.open(game.url, '_blank');
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById('sidebar').style.display = (view === 'home') ? 'block' : 'none';
            window.scrollTo(0,0);
        }

        window.onload = init;
    </script>
</body>
</html>
