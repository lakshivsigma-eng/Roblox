<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven 3D - Ultra Stable</title>
    <style>
        /* This builds a 3D world without needing outside libraries */
        body { margin: 0; background: #87CEEB; overflow: hidden; perspective: 1000px; font-family: sans-serif; }
        
        #world { 
            position: absolute; width: 100vw; height: 100vh;
            transform-style: preserve-3d;
            transform: rotateX(60deg) translateY(-200px);
            transition: transform 0.1s;
        }

        /* THE MAP */
        .grass {
            position: absolute; width: 5000px; height: 5000px;
            background: #567d46; top: -2500px; left: -2500px;
            transform: translateZ(0);
        }

        .road {
            position: absolute; width: 60px; height: 5000px;
            background: #333; top: -2500px; left: 50%;
            transform: translateX(-50%) translateZ(1px);
            border-left: 2px dashed white; border-right: 2px dashed white;
        }

        /* THE PLAYER */
        #player {
            position: absolute; width: 20px; height: 20px;
            background: #00A2FF; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(10px);
            box-shadow: 0 0 20px #00A2FF;
        }

        /* UI */
        #gui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; pointer-events: auto; }
        .slot { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .slot.active { background: #00A2FF; border-color: white; }
    </style>
</head>
<body>

    <div id="gui">
        <div id="inventory">
            <div class="slot">🍕</div>
            <div class="slot">📱</div>
            <div class="slot active">🛠️</div>
            <div class="slot">🚗</div>
            <div class="slot">🏠</div>
        </div>
    </div>

    <div id="world">
        <div class="grass"></div>
        <div class="road"></div>
        <div id="player"></div>
    </div>

    <script>
        let x = 0; let y = 0;
        const world = document.getElementById('world');
        const keys = {};

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function loop() {
            if(keys['KeyW']) y += 5;
            if(keys['KeyS']) y -= 5;
            if(keys['KeyA']) x += 5;
            if(keys['KeyD']) x -= 5;

            // Move the world, not the player (like a real camera)
            world.style.transform = `rotateX(60deg) translateY(${-200 + y}px) translateX(${x}px)`;
            
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
