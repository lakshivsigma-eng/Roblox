<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roblox Ultra: Multi-Game Engine</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* UI HUD */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 10; display: flex; flex-direction: column; gap: 10px; }
        .mode-panel { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border-left: 5px solid #00A2FF; }
        
        .btn { background: #00A2FF; border: none; padding: 10px 15px; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px 0; width: 100%; transition: 0.2s; }
        .btn:hover { background: #0080CC; transform: scale(1.05); }
        .btn.murder { background: #FF4444; }
        .btn.murder:hover { background: #CC0000; }

        #game-label { position: fixed; top: 20px; right: 20px; font-size: 24px; font-weight: 900; color: #00A2FF; text-transform: uppercase; letter-spacing: 2px; }
        #inventory { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        .slot { width: 50px; height: 50px; border: 2px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="game-label">RP MODE</div>

    <div id="hud">
        <div class="mode-panel">
            <div style="font-size: 12px; margin-bottom: 10px; color: #888;">SELECT GAME MODE</div>
            <button class="btn" onclick="setMode('RP')">🏘️ BROOKHAVEN RP</button>
            <button class="btn murder" onclick="setMode('MM2')">🔪 MURDER MYSTERY 2</button>
        </div>
        
        <div class="mode-panel" id="rp-tools">
            <button class="btn" onclick="spawnObject('car')">🚗 SPAWN CAR</button>
            <button class="btn" onclick="spawnObject('house')">🏠 BUILD HOUSE</button>
        </div>

        <div class="mode-panel" id="mm2-tools" style="display:none;">
            <button class="btn murder" onclick="spawnObject('knife')">🔪 EQUIP KNIFE</button>
            <button class="btn murder" onclick="spawnObject('gun')">🔫 EQUIP REVOLVER</button>
        </div>
    </div>

    <div id="inventory">
        <div class="slot" id="s1">📱</div>
        <div class="slot" id="s2">🍕</div>
        <div class="slot" id="s3">🛠️</div>
    </div>

    <script>
        // --- 1. ENGINE INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        light.castShadow = true;
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        // --- 2. MAP ELEMENTS ---
        const grid = new THREE.GridHelper(200, 40, 0x00A2FF, 0x222222);
        scene.add(grid);
        
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x111111}));
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- 3. PLAYER ---
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({color: 0xffffff}));
        body.position.y = 1;
        player.add(body);
        scene.add(player);

        // --- 4. GAME MODES & SPAWNING ---
        let currentMode = 'RP';
        let objects = [];

        window.setMode = function(mode) {
            currentMode = mode;
            document.getElementById('game-label').innerText = mode + " MODE";
            document.getElementById('game-label').style.color = mode === 'MM2' ? '#FF4444' : '#00A2FF';
            
            document.getElementById('rp-tools').style.display = mode === 'RP' ? 'block' : 'none';
            document.getElementById('mm2-tools').style.display = mode === 'MM2' ? 'block' : 'none';
            
            // Change World Atmosphere
            scene.background = new THREE.Color(mode === 'MM2' ? 0x1a0000 : 0x0a0a0a);
        }

        window.spawnObject = function(type) {
            let mesh;
            if(type === 'car') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 2.5), new THREE.MeshStandardMaterial({color: 0xff0000}));
                document.getElementById('s3').innerText = "🚗";
            } else if(type === 'house') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 8), new THREE.MeshStandardMaterial({color: 0x8B4513}));
                mesh.position.y = 4;
            } else if(type === 'knife') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1, 0.1), new THREE.MeshStandardMaterial({color: 0xcccccc}));
                document.getElementById('s3').innerText = "🔪";
            } else if(type === 'gun') {
                mesh = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 1.2), new THREE.MeshStandardMaterial({color: 0x333333}));
                document.getElementById('s3').innerText = "🔫";
            }
            
            if(mesh) {
                mesh.position.set(player.position.x + 5, mesh.position.y || 1, player.position.z);
                scene.add(mesh);
                objects.push(mesh);
            }
        }

        // --- 5. CONTROLS & ANIMATION ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            
            const speed = 0.2;
            if (keys['KeyW']) player.position.z -= speed;
            if (keys['KeyS']) player.position.z += speed;
            if (keys['KeyA']) player.position.x -= speed;
            if (keys['KeyD']) player.position.x += speed;

            // Smooth Camera Follow
            camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 12, player.position.z + 18), 0.1);
            camera.lookAt(player.position);
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
