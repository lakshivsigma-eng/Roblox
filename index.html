<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover - Roblox</title>
    <link rel="stylesheet" href="global.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Page-specific styles for Discover */
        .discover-page {
            min-height: 100vh;
            padding-bottom: 60px;
        }

        .discover-hero {
            background: linear-gradient(135deg, #1a1d23 0%, #232527 100%);
            padding: 40px 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .discover-hero-content {
            max-width: 1920px;
            margin: 0 auto;
        }

        .discover-title {
            font-size: 2.5rem;
            font-weight: var(--font-weight-bold);
            margin-bottom: 12px;
            background: linear-gradient(135deg, #FFFFFF 0%, #B8B8B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .discover-subtitle {
            font-size: 1.125rem;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .discover-filters {
            display: flex;
            gap: var(--spacing-sm);
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 8px 16px;
            background-color: var(--bg-tertiary);
            border: 1px solid transparent;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: var(--font-weight-medium);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-chip:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .filter-chip.active {
            background-color: var(--roblox-blue);
            color: var(--text-primary);
            border-color: var(--roblox-blue);
        }

        /* 15-Game Grid Container */
        .discover-grid {
            max-width: 1920px;
            margin: 0 auto;
            padding: 32px 24px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        /* Enhanced game card for discover page */
        .discover-game-card {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-md);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .discover-game-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-md);
            padding: 1px;
            background: linear-gradient(135deg, rgba(0, 162, 255, 0.3), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .discover-game-card:hover::before {
            opacity: 1;
        }

        .discover-game-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 162, 255, 0.15);
        }

        .discover-game-card:active {
            transform: translateY(-2px) scale(1.01);
        }

        /* Thumbnail with play button overlay */
        .discover-thumbnail {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: var(--bg-tertiary);
            overflow: hidden;
        }

        .discover-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .discover-game-card:hover .discover-thumbnail img {
            transform: scale(1.1);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: var(--overlay-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .discover-game-card:hover .play-overlay {
            opacity: 1;
        }

        .play-button {
            width: 56px;
            height: 56px;
            background-color: var(--roblox-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .discover-game-card:hover .play-button {
            transform: scale(1);
        }

        .play-button svg {
            margin-left: 3px;
        }

        /* Game card content */
        .discover-game-content {
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .discover-game-title {
            font-size: 1rem;
            font-weight: var(--font-weight-semibold);
            color: var(--text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 2.8em;
        }

        .discover-game-stats {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--spacing-md);
            margin-top: auto;
        }

        .stat-group {
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            font-weight: var(--font-weight-medium);
        }

        .stat-item svg {
            width: 14px;
            height: 14px;
        }

        .like-percentage {
            color: var(--green-positive);
        }

        .like-percentage svg {
            color: var(--green-positive);
        }

        .player-count {
            color: var(--text-secondary);
        }

        .player-count svg {
            color: var(--text-tertiary);
        }

        /* Responsive grid */
        @media (max-width: 1600px) {
            .discover-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1200px) {
            .discover-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .discover-grid {
                grid-template-columns: repeat(2, 1fr);
                padding: 24px 16px;
                gap: 16px;
            }

            .discover-hero {
                padding: 24px 16px 16px;
            }

            .discover-title {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .discover-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading state */
        .game-card-loading {
            opacity: 0.6;
            pointer-events: none;
        }

        /* Empty state */
        .discover-empty {
            text-align: center;
            padding: 80px 24px;
        }

        .discover-empty h3 {
            color: var(--text-secondary);
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .discover-empty p {
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>

    <!-- Discover Page -->
    <main class="discover-page">

        <section class="discover-hero">

                <p class="discover-subtitle">Explore thousands of immersive experiences created by our community</p>
                
                <div class="discover-filters">
                    <button class="filter-chip active">All Games</button>
                    <button class="filter-chip">Popular</button>
                    <button class="filter-chip">Featured</button>
                    <button class="filter-chip">Adventure</button>
                    <button class="filter-chip">Shooter</button>
                    <button class="filter-chip">RPG</button>
                    <button class="filter-chip">Simulation</button>
                    <button class="filter-chip">Horror</button>
                    <button class="filter-chip">Platformer</button>
                </div>
            </div>
        </section>

        <!-- 15-Game Grid -->
        <section class="discover-grid" id="gamesGrid">
            <!-- Games will be populated by JavaScript -->
        </section>
    </main>

            }

        // Function to format player count
        function formatPlayerCount(count) {
            return count;
        }

        // Function to create a game card
        function createGameCard(game, index) {
            return `
                <article class="discover-game-card fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="discover-thumbnail">
                        <img src="${game.thumbnail}" alt="${game.title}" loading="lazy">
                        <div class="play-overlay">
                            <div class="play-button">
                                <i data-lucide="play" style="width: 24px; height: 24px; color: white;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="discover-game-content">
                        <h3 class="discover-game-title">${game.title}</h3>
                        <div class="discover-game-stats">
                            <div class="stat-item like-percentage">
                                <i data-lucide="thumbs-up" style="width: 14px; height: 14px;"></i>
                                <span class="stat-value">${game.likePercentage}%</span>
                            </div>
                            <div class="stat-item player-count">
                                <i data-lucide="users" style="width: 14px; height: 14px;"></i>
                                <span class="stat-value">${formatPlayerCount(game.playerCount)}</span>
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        // Populate the grid
        function populateGamesGrid() {
            const gridContainer = document.getElementById('gamesGrid');
            const gameCards = games.map((game, index) => createGameCard(game, index)).join('');
            gridContainer.innerHTML = gameCards;
            
            // Initialize Lucide icons after DOM update
            lucide.createIcons();
        }

        // Filter functionality
        function setupFilters() {
            const filterChips = document.querySelectorAll('.filter-chip');
            
            filterChips.forEach(chip => {
                chip.addEventListener('click', function() {
                    // Remove active class from all chips
                    filterChips.forEach(c => c.classList.remove('active'));
                    // Add active class to clicked chip
                    this.classList.add('active');
                    
                    // In a real implementation, this would filter the games
                    console.log('Filter selected:', this.textContent);
                });
            });
        }

        // Game card click handler
        function setupGameCardListeners() {
            const gameCards = document.querySelectorAll('.discover-game-card');
            
            gameCards.forEach(card => {
                card.addEventListener('click', function() {
                    const title = this.querySelector('.discover-game-title').textContent;
                    console.log('Game clicked:', title);
                    // In a real implementation, this would navigate to the game page
                    alert(`Loading ${title}...`);
                });
            });
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            populateGamesGrid();
            setupFilters();
            setupGameCardListeners();
            lucide.createIcons();
        });
