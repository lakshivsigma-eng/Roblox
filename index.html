<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven 3D - Final Fix</title>
    <style>
        /* THIS BUILDS THE MAP WITHOUT NEEDING OUTSIDE LIBRARIES */
        body { margin: 0; background: #87CEEB; overflow: hidden; perspective: 1000px; font-family: sans-serif; }
        #world { 
            position: absolute; width: 100vw; height: 100vh;
            transform-style: preserve-3d;
            transform: rotateX(60deg) translateY(-200px);
        }
        .grass {
            position: absolute; width: 4000px; height: 4000px;
            background: #567d46; top: -2000px; left: -2000px;
            transform: translateZ(0);
        }
        .road {
            position: absolute; width: 100px; height: 4000px;
            background: #333; top: -2000px; left: 50%;
            transform: translateX(-50%) translateZ(1px);
            border-left: 5px dashed white; border-right: 5px dashed white;
        }
        .house {
            position: absolute; width: 100px; height: 80px; background: white;
            left: calc(50% + 100px); top: 50%; transform: translateZ(40px);
            border: 4px solid #444; display: flex; align-items: center; justify-content: center; font-size: 40px;
        }
        #player {
            position: absolute; width: 30px; height: 30px;
            background: #222; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(20px);
            border-radius: 50%; box-shadow: 0 0 20px #00A2FF;
        }
        /* UI HUD */
        #gui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        .panel { position: absolute; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; display: flex; gap: 10px; }
        .side-right { right: 20px; top: 50%; transform: translateY(-50%); flex-direction: column; }
        .bottom { bottom: 20px; left: 50%; transform: translateX(-50%); flex-direction: row; }
        .btn { width: 55px; height: 55px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border: 3px solid #ddd; }
        #job { position: absolute; top: 20px; right: 20px; background: #00A2FF; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="gui">
        <div id="job">👔 Job: Police</div>
        <div class="panel side-right">
            <div class="btn" onclick="alert('Car Spawned!')">🚗</div>
            <div class="btn" onclick="alert('House Built!')">🏠</div>
            <div class="btn" onclick="location.reload()">🔄</div>
        </div>
        <div class="panel bottom">
            <div class="btn">🍕</div>
            <div class="btn">📱</div>
            <div class="btn">🛠️</div>
        </div>
    </div>

    <div id="world">
        <div class="grass"></div>
        <div class="road"></div>
        <div class="house">🏠</div>
        <div id="player"></div>
    </div>

    <script>
        let px = 0; let py = 0;
        const world = document.getElementById('world');
        const keys = {};

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function loop() {
            if(keys['KeyW']) py += 8;
            if(keys['KeyS']) py -= 8;
            if(keys['KeyA']) px += 8;
            if(keys['KeyD']) px -= 8;

            world.style.transform = `rotateX(60deg) translateY(${-200 + py}px) translateX(${px}px)`;
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
