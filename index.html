<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Brookhaven 3D - Mega Town</title>
    <script src="https://cloudflare.com"></script>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        #gui { position: fixed; inset: 0; pointer-events: none; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 15px; pointer-events: auto; border: 2px solid rgba(255,255,255,0.1); }
        .slot { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.2s; }
        .slot:hover { background: rgba(0,162,255,0.3); transform: scale(1.1); }
        .slot.active { background: #00A2FF; border-color: white; box-shadow: 0 0 15px #00A2FF; }
        #controls { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="gui">
        <div id="controls">WASD to Walk | Mouse to Look</div>
        <div id="inventory">
            <div class="slot" onclick="sel(this)">🍕</div>
            <div class="slot" onclick="sel(this)">📱</div>
            <div class="slot active" onclick="sel(this)">🛠️</div>
            <div class="slot" onclick="sel(this)">🚗</div>
            <div class="slot" onclick="sel(this)">🏠</div>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 1, 150);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // --- THE MAP ---
        // Huge Grass
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({color: 0x567d46}));
        ground.rotation.x = -Math.PI/2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Long Road
        const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 1000), new THREE.MeshStandardMaterial({color: 0x333333}));
        road.rotation.x = -Math.PI/2;
        road.position.y = 0.05;
        scene.add(road);

        // Function to build a House
        function addHouse(x, z, color) {
            const h = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(12, 8, 10), new THREE.MeshStandardMaterial({color: color}));
            body.position.y = 4;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(10, 5, 4), new THREE.MeshStandardMaterial({color: 0x222222}));
            roof.position.y = 10.5;
            roof.rotation.y = Math.PI/4;
            h.add(body); h.add(roof);
            h.position.set(x, 0, z);
            scene.add(h);
        }

        // Add 10 Houses along the road
        for(let i=0; i<5; i++) {
            addHouse(-20, -100 + (i*50), 0xffffff); // Left side
            addHouse(20, -100 + (i*50), 0xdddddd);  // Right side
        }

        // --- PLAYER ---
        const player = new THREE.Group();
        player.position.set(0, 0, 0);
        scene.add(player);

        function sel(e) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            e.classList.add('active');
        }

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function render() {
            requestAnimationFrame(render);
            if(keys['KeyW']) player.position.z -= 0.3;
            if(keys['KeyS']) player.position.z += 0.3;
            if(keys['KeyA']) player.position.x -= 0.3;
            if(keys['KeyD']) player.position.x += 0.3;

            // Follow Camera
            camera.position.set(player.position.x, 15, player.position.z + 25);
            camera.lookAt(player.position);
            renderer.render(scene, camera);
        }
        render();
    </script>
</body>
</html>
